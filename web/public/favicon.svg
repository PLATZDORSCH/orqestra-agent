<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="#0c0c0e"/>
  <rect width="48" height="48" rx="10" fill="url(#bg-glow)" opacity="0.4"/>

  <!-- Connection lines from center to outer nodes -->
  <line x1="24" y1="24" x2="8"  y2="10" stroke="#16a34a" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="24" y1="24" x2="40" y2="10" stroke="#16a34a" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="24" y1="24" x2="8"  y2="38" stroke="#16a34a" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="24" y1="24" x2="40" y2="38" stroke="#16a34a" stroke-width="1.2" stroke-opacity="0.5"/>

  <!-- Outer department nodes -->
  <circle cx="8"  cy="10" r="3.5" fill="#111113" stroke="#4ade80" stroke-width="1.2" stroke-opacity="0.6"/>
  <circle cx="40" cy="10" r="3.5" fill="#111113" stroke="#4ade80" stroke-width="1.2" stroke-opacity="0.6"/>
  <circle cx="8"  cy="38" r="3.5" fill="#111113" stroke="#4ade80" stroke-width="1.2" stroke-opacity="0.6"/>
  <circle cx="40" cy="38" r="3.5" fill="#111113" stroke="#4ade80" stroke-width="1.2" stroke-opacity="0.6"/>

  <!-- Center orchestrator node glow -->
  <circle cx="24" cy="24" r="10" fill="url(#center-glow)" opacity="0.3"/>

  <!-- Center orchestrator node -->
  <circle cx="24" cy="24" r="7.5" fill="#0f1f14" stroke="#4ade80" stroke-width="1.5"/>

  <!-- Center dot -->
  <circle cx="24" cy="24" r="2.5" fill="#4ade80"/>

  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
